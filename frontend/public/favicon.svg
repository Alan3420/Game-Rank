<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 52 52">
  <defs>
    <linearGradient id="hg" x1="6" y1="5" x2="46" y2="47" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#4338CA"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <!-- Clip al hexágono para las líneas interiores -->
    <clipPath id="hc">
      <polygon points="26,5 45,16 45,38 26,49 7,38 7,16"/>
    </clipPath>
  </defs>

  <!-- ── Hexágono principal (pointed-top, igual que el PNG) ── -->
  <polygon points="26,5 45,16 45,38 26,49 7,38 7,16" fill="url(#hg)"/>

  <!-- ── Líneas diagonales interiores (acento estilo speed lines) ── -->
  <g clip-path="url(#hc)" opacity="0.22">
    <line x1="-4" y1="22" x2="38" y2="-4"  stroke="#fff" stroke-width="4"   stroke-linecap="round"/>
    <line x1="4"  y1="36" x2="54" y2="6"   stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-2" y1="40" x2="30" y2="18"  stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- ── "GR" centrado en el hexágono ── -->
  <text x="26" y="38"
        font-family="Impact,'Arial Black','Helvetica Neue',Arial,sans-serif"
        font-size="27"
        font-weight="900"
        fill="#ffffff"
        text-anchor="middle"
        letter-spacing="-1">GR</text>

  <!-- ── Cuadrados dispersos exteriores (esquina superior-derecha) ── -->
  <rect x="44" y="5"  width="6" height="6" fill="url(#hg)" rx="1"/>
  <rect x="46" y="13" width="4" height="4" fill="url(#hg)" rx="1" opacity="0.7"/>

  <!-- ── Cuadrados dispersos exteriores (esquina inferior-izquierda) ── -->
  <rect x="2"  y="41" width="5" height="5" fill="url(#hg)" rx="1"/>
  <rect x="1"  y="34" width="3" height="3" fill="url(#hg)" rx="1" opacity="0.7"/>

  <!-- ── Líneas exteriores diagonales (arriba-izquierda) ── -->
  <line x1="0"  y1="17" x2="8"  y2="11" stroke="#5B4FE8" stroke-width="3"   stroke-linecap="round"/>
  <line x1="1"  y1="22" x2="8"  y2="17" stroke="#5B4FE8" stroke-width="2"   stroke-linecap="round"/>
  <line x1="2"  y1="26" x2="7"  y2="23" stroke="#5B4FE8" stroke-width="1.2" stroke-linecap="round"/>

  <!-- ── Líneas exteriores diagonales (abajo-derecha) ── -->
  <line x1="44" y1="35" x2="52" y2="29" stroke="#5B4FE8" stroke-width="3"   stroke-linecap="round"/>
  <line x1="44" y1="40" x2="51" y2="34" stroke="#5B4FE8" stroke-width="2"   stroke-linecap="round"/>
  <line x1="43" y1="44" x2="50" y2="39" stroke="#5B4FE8" stroke-width="1.2" stroke-linecap="round"/>
</svg>
