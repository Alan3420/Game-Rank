<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 215" width="460" height="215">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1f33;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#252d47;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="460" height="215" fill="url(#grad)"/>

  <!-- Icono de imagen grande -->
  <g transform="translate(230, 95)">
    <!-- Marco de la imagen -->
    <rect x="-35" y="-30" width="70" height="60" fill="none" stroke="#6366f1" stroke-width="2" rx="4"/>

    <!-- Círculo (sol/luna) -->
    <circle cx="-18" cy="-15" r="8" fill="#6366f1" opacity="0.7"/>

    <!-- Línea de montaña -->
    <path d="M -32 15 L -10 -5 L 5 8 L 32 -10 L 32 18" fill="none" stroke="#6366f1" stroke-width="2" stroke-linecap="round"/>
  </g>

  <text x="230" y="165" font-family="Sora, sans-serif" font-size="13" fill="#9ca3af" text-anchor="middle" font-weight="500">Sin imagen disponible</text>
</svg>
