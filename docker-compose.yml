version: "3.9"

services:
  backend:
    build: ./backend
    container_name: game_rank_backend
    ports:
      - "8080:8080"
    depends_on:
      - db
    environment:
      - DATABASE_URL=mysql+pymysql://root:root@db:3306/game_rank
    volumes:
      - ./backend:/app

  db:
    image: mysql:8.0
    container_name: game_rank_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: game_rank
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: